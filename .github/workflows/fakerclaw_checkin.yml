name: FakerClaw Checkin

on:
  schedule:
    - cron: "13 0 * * *"   # 北京时间 08:13 = UTC 00:13
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run script
        env:
          FAKERCLAW_COOKIE_ACCOUNTS: ${{ secrets.FAKERCLAW_COOKIE_ACCOUNTS }}
          FAKERCLAW_ACCOUNTS: ${{ secrets.FAKERCLAW_ACCOUNTS }}
          FAKERCLAW_BASE_URL: ${{ secrets.FAKERCLAW_BASE_URL }}
        run: node fakerclaw_checkin.js
