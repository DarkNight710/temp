name: Run JS on schedule

on:
  schedule:
    - cron: "5 0 * * *"   # 每天 UTC 01:00
      timezone: "Asia/Shanghai"
  workflow_dispatch:      # 允许你在 GitHub 页面手动点一下运行

jobs:
  run-js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run script
        run: node fakerclaw_checkin.js
